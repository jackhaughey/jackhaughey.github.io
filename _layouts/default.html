<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>

  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
    <hr>
  </header>

  <main>
    {{ content }}
  </main>
  <footer>
    <p>
      Last updated: {{ site.time | date: "%Y-%m-%d" }} · 
      <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}">View on GitHub</a>
    </p>
  </footer>

</body>
</html>
